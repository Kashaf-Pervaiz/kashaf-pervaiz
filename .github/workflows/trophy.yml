name: Generate Trophy Image

on:
  schedule:
    - cron: "0 0 * * *"    # runs once a day
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Kashaf-Pervaiz
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy image
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git diff --staged --quiet || git commit -m "Update trophy image"
          git push
