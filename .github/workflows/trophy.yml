name: Generate Trophy Image

on:
  schedule:
    - cron: "0 0 * * *"    # runs once a day
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Generate trophy image
        uses: ryo-ma/github-profile-trophy@v1
        with:
          username: Kashaf-Pervaiz
          theme: tokyonight
          no-frame: true
          row: 1
          column: 6
          output: trophy.svg

      - name: Commit trophy image
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trophy.svg
          git diff --staged --quiet || git commit -m "Update trophy image"
          git push
